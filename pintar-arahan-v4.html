<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Pintar Arahan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{font-size:16px}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#FFFBEB;min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;padding:10px;overflow-x:hidden}
.screen{display:none;width:100%;max-width:700px;animation:fadeIn .4s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── TITLE ── */
#screen-title{text-align:center;padding:16px 8px}
.title-badge{background:#FCD34D;border-radius:50px;padding:7px 20px;font-size:.85rem;font-weight:700;color:#92400E;display:inline-block;margin-bottom:12px}
.title-main{font-size:clamp(2.4rem,10vw,3.8rem);font-weight:900;color:#D97706;text-shadow:3px 3px 0 #FCD34D,-1px -1px 0 #F59E0B;line-height:1;margin-bottom:6px}
.title-stars{font-size:clamp(1.4rem,6vw,2rem);margin-bottom:6px}
.title-sub{font-size:clamp(.9rem,3.5vw,1.1rem);color:#78716C;margin-bottom:18px;font-weight:600}
.preview-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.preview-card{background:#fff;border-radius:16px;border:3px solid #FCD34D;padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:0 4px 10px rgba(0,0,0,.07);min-width:80px}
.preview-card img{width:clamp(52px,12vw,80px);height:clamp(52px,12vw,80px);object-fit:contain}
.preview-card span{font-size:clamp(.65rem,2.5vw,.78rem);font-weight:800;color:#374151;text-align:center}
.name-section{margin-bottom:18px}
.name-label{font-size:clamp(.95rem,3.5vw,1rem);font-weight:800;color:#92400E;margin-bottom:8px}
.name-input{width:100%;max-width:340px;padding:13px 18px;font-size:clamp(1rem,4vw,1.2rem);font-weight:700;border:3px solid #FCD34D;border-radius:50px;text-align:center;outline:none;color:#374151;background:#fff;font-family:inherit;-webkit-appearance:none}
.name-input:focus{border-color:#F59E0B;box-shadow:0 0 0 3px rgba(251,191,36,.3)}
.btn-start{background:linear-gradient(145deg,#10B981,#059669);color:#fff;border:none;border-radius:50px;padding:clamp(14px,4vw,18px) clamp(40px,12vw,64px);font-size:clamp(1.2rem,5vw,1.5rem);font-weight:900;cursor:pointer;box-shadow:0 6px 0 #047857,0 8px 20px rgba(16,185,129,.3);letter-spacing:1px;-webkit-appearance:none;user-select:none}
.btn-start:active{transform:translateY(5px);box-shadow:0 1px 0 #047857}

/* ── PROGRESS ── */
.progress-wrap{background:#E5E7EB;border-radius:50px;height:16px;margin-bottom:10px;overflow:hidden;border:2px solid #D1D5DB}
.progress-bar{background:linear-gradient(90deg,#FBBF24,#F59E0B);height:100%;border-radius:50px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.q-label{font-size:clamp(.8rem,3vw,.9rem);font-weight:700;color:#78716C}
.score-disp{font-size:clamp(.8rem,3vw,.9rem);font-weight:700;color:#D97706}
.section-banner{text-align:center;padding:6px 0;margin-bottom:10px}
.section-pill{background:linear-gradient(135deg,#8B5CF6,#6D28D9);color:#fff;border-radius:50px;padding:7px 18px;font-size:clamp(.75rem,3vw,.85rem);font-weight:800;display:inline-block}

/* ── CARD ── */
.question-card{background:#fff;border-radius:22px;padding:clamp(14px,4vw,22px);box-shadow:0 8px 28px rgba(0,0,0,.07);border:3px solid #FCD34D;margin-bottom:12px}
.q-instruction{font-size:clamp(.9rem,3.5vw,1.05rem);font-weight:700;color:#374151;margin-bottom:14px;line-height:1.5}

/* ── FIGURE DISPLAY ── */
.figure-display{display:flex;justify-content:center;align-items:center;background:#F9FAFB;border-radius:16px;padding:12px;margin-bottom:14px;border:2px dashed #D1D5DB;min-height:clamp(140px,35vw,180px)}
.figure-display img{width:clamp(120px,30vw,180px);height:clamp(120px,30vw,180px);object-fit:contain}

/* ── WORD CHOICES ── */
.word-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.word-btn{background:#F9FAFB;border:3px solid #E5E7EB;border-radius:14px;padding:clamp(12px,3vw,16px) 6px;cursor:pointer;font-size:clamp(.82rem,3.2vw,1.05rem);font-weight:800;color:#374151;transition:border-color .12s,background .12s;text-align:center;-webkit-appearance:none;user-select:none;min-height:52px;display:flex;align-items:center;justify-content:center}
.word-btn:active{border-color:#FBBF24;background:#FFFBEB;transform:scale(.97)}
.word-btn.correct{border-color:#10B981!important;background:#D1FAE5!important;color:#065F46!important;animation:popUp .3s ease}
.word-btn.wrong{border-color:#EF4444!important;background:#FEE2E2!important;color:#991B1B!important;animation:shake .3s ease}
@keyframes popUp{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── IMAGE CHOICES ── */
.image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.image-btn{background:#F9FAFB;border:3px solid #E5E7EB;border-radius:14px;padding:8px 5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:border-color .12s,background .12s;-webkit-appearance:none;user-select:none}
.image-btn:active{border-color:#FBBF24;background:#FFFBEB;transform:scale(.97)}
.image-btn img{width:clamp(70px,22vw,110px);height:clamp(70px,22vw,110px);object-fit:contain;pointer-events:none}
.image-btn .img-label{font-size:clamp(.72rem,2.8vw,.82rem);font-weight:800;color:#374151;pointer-events:none}
.image-btn.correct{border-color:#10B981!important;background:#D1FAE5!important;animation:popUp .3s ease}
.image-btn.wrong{border-color:#EF4444!important;background:#FEE2E2!important;animation:shake .3s ease}

/* ── WORD DISPLAY ── */
.word-display{background:linear-gradient(135deg,#FEF3C7,#FCD34D);border:3px solid #F59E0B;border-radius:18px;padding:clamp(10px,3vw,14px) clamp(20px,8vw,36px);font-size:clamp(1.4rem,6vw,1.8rem);font-weight:900;color:#92400E;letter-spacing:1px;display:inline-block}

/* ── AUDIO ── */
.audio-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px}
.btn-audio{background:linear-gradient(145deg,#EC4899,#BE185D);color:#fff;border:none;border-radius:50%;width:clamp(70px,18vw,85px);height:clamp(70px,18vw,85px);font-size:clamp(1.7rem,6vw,2.2rem);cursor:pointer;box-shadow:0 5px 0 #9D174D;-webkit-appearance:none;user-select:none;display:flex;align-items:center;justify-content:center}
.btn-audio:active{transform:translateY(4px);box-shadow:0 1px 0 #9D174D}
.btn-audio.ringing{animation:ring .7s infinite}
@keyframes ring{0%,100%{box-shadow:0 5px 0 #9D174D,0 0 0 0 rgba(236,72,153,.4)}60%{box-shadow:0 5px 0 #9D174D,0 0 0 18px rgba(236,72,153,0)}}
.audio-hint{font-size:clamp(.8rem,3vw,.9rem);color:#9CA3AF;font-weight:600}

/* ── MATCH ── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.match-col-head{text-align:center;font-size:clamp(.75rem,3vw,.85rem);font-weight:800;color:#6B7280;margin-bottom:6px;background:#F3F4F6;border-radius:50px;padding:5px}
.match-items{display:flex;flex-direction:column;gap:7px}
.match-item{background:#F9FAFB;border:3px solid #E5E7EB;border-radius:13px;padding:8px 6px;cursor:pointer;transition:border-color .12s,background .12s;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:clamp(75px,20vw,95px);justify-content:center;position:relative;user-select:none;-webkit-user-select:none}
.match-item:active:not(.matched){border-color:#FBBF24;background:#FFFBEB}
.match-item.selected{border-color:#3B82F6;background:#EFF6FF}
.match-item.matched{cursor:default}
.match-item img{width:clamp(52px,14vw,72px);height:clamp(52px,14vw,72px);object-fit:contain;pointer-events:none}
.match-item .mw-label{font-size:clamp(.82rem,3.2vw,1rem);font-weight:800;color:#374151;pointer-events:none;text-align:center}
.match-dot{width:12px;height:12px;border-radius:50%;position:absolute;top:6px;right:6px}
.match-submit{width:100%;background:linear-gradient(145deg,#8B5CF6,#6D28D9);color:#fff;border:none;border-radius:50px;padding:14px;font-size:clamp(.95rem,3.8vw,1.1rem);font-weight:800;cursor:pointer;box-shadow:0 4px 0 #4C1D95;-webkit-appearance:none}
.match-submit:disabled{opacity:.45;cursor:not-allowed}
.match-submit:active:not(:disabled){transform:translateY(4px);box-shadow:0 1px 0 #4C1D95}

/* ── FEEDBACK ── */
.feedback-bar{border-radius:14px;padding:12px 14px;margin-top:10px;font-size:clamp(.92rem,3.5vw,1.05rem);font-weight:800;text-align:center;display:none;animation:fadeIn .25s ease}
.feedback-bar.correct{background:#D1FAE5;color:#065F46;border:2px solid #10B981}
.feedback-bar.wrong{background:#FEE2E2;color:#991B1B;border:2px solid #EF4444}
.feedback-bar.show{display:block}

/* ── NEXT ── */
.btn-next{display:none;width:100%;background:linear-gradient(145deg,#3B82F6,#1D4ED8);color:#fff;border:none;border-radius:50px;padding:clamp(13px,4vw,15px);font-size:clamp(.95rem,4vw,1.1rem);font-weight:800;cursor:pointer;box-shadow:0 5px 0 #1E3A8A;margin-top:10px;-webkit-appearance:none}
.btn-next:active{transform:translateY(4px);box-shadow:0 1px 0 #1E3A8A}
.btn-next.visible{display:block}

/* ── RESULTS ── */
#screen-results{text-align:center;padding:clamp(14px,5vw,20px)}
.result-trophy{font-size:clamp(3.5rem,15vw,5rem);animation:bounce .8s infinite alternate}
@keyframes bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-12px) scale(1.05)}}
.result-title{font-size:clamp(1.8rem,7vw,2.6rem);font-weight:900;color:#D97706;margin:10px 0}
.result-score{font-size:clamp(1rem,4vw,1.3rem);color:#374151;margin-bottom:10px}
.result-stars{font-size:clamp(2rem,8vw,2.8rem);margin:8px 0 14px}
.result-msg{background:#fff;border-radius:18px;border:3px solid #FCD34D;padding:14px;font-size:clamp(.88rem,3.5vw,1rem);color:#6B7280;margin-bottom:20px;line-height:1.6;font-weight:600}
.btn-restart{background:linear-gradient(145deg,#F59E0B,#D97706);color:#fff;border:none;border-radius:50px;padding:clamp(13px,4vw,16px) clamp(36px,10vw,50px);font-size:clamp(1rem,4.5vw,1.2rem);font-weight:900;cursor:pointer;box-shadow:0 5px 0 #92400E;-webkit-appearance:none}
.btn-restart:active{transform:translateY(4px);box-shadow:0 1px 0 #92400E}

/* ── CONFETTI ── */
.confetti-p{position:fixed;top:-20px;animation:cfall linear forwards;pointer-events:none;z-index:999}
@keyframes cfall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* ── MOBILE TWEAKS ── */
@media(max-width:420px){
  .word-grid,.image-grid{gap:6px}
  .match-grid{gap:7px}
  .question-card{padding:12px}
}
</style>
</head>

let cur=0, score=0, answered=false;
let mState={sel:null, pairs:{}};

function startGame(){
  const nameEl=document.getElementById('name-input');
  const name=nameEl?nameEl.value.trim():'';
  window._studentName = name || 'Murid';
  cur=0; score=0; answered=false; showScreen('screen-game'); renderQ();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQ(){
  answered=false;
  document.getElementById('btn-next').classList.remove('visible');
  document.getElementById('feedback-bar').classList.remove('show','correct','wrong');
  document.getElementById('q-label').textContent=`Soalan ${cur+1} / 10`;
  document.getElementById('score-disp').textContent=`⭐ ${score}`;
  document.getElementById('prog').style.width=((cur+1)/10*100)+'%';

  const q=questions[cur];
  const banner=document.getElementById('section-banner');
  if(q.section){ banner.innerHTML=`<span class="section-pill">${q.section}</span>`; banner.style.display='block'; }
  else banner.style.display='none';

  const card=document.getElementById('qcard');
  if(q.type==='text_to_image') renderTextToImage(q,card);
  else if(q.type==='image_to_word') renderImageToWord(q,card);
  else if(q.type==='audio_to_image') renderAudioToImage(q,card);
  else if(q.type==='match') renderMatch(q,card);
}

// ── TEXT → IMAGE ──────────────────────────────────────────
function renderTextToImage(q,card){
  card.innerHTML=`
    <div class="q-instruction">${q.instruction}</div>
    <div style="text-align:center;margin-bottom:16px">
      <div class="word-display">${LABELS[q.action]}</div>
    </div>
    <div class="image-grid" id="choices">
      ${q.choices.map(c=>`
        <button class="image-btn" onclick="pickImage('${c}','${q.action}',this)">
          <img src="${IMGS[c]}" alt="${LABELS[c]}" style="width:110px;height:110px">
        </button>`).join('')}
    </div>`;
}

// ── IMAGE → WORD ──────────────────────────────────────────
function renderImageToWord(q,card){
  card.innerHTML=`
    <div class="q-instruction">${q.instruction}</div>
    <div class="figure-display"><img src="${IMGS[q.action]}" alt="${LABELS[q.action]}"></div>
    <div class="word-grid" id="choices">
      ${q.choices.map(c=>`
        <button class="word-btn" onclick="pickWord('${c}','${q.action}',this)">${LABELS[c]}</button>
      `).join('')}
    </div>`;
}

// ── AUDIO → IMAGE ─────────────────────────────────────────
function renderAudioToImage(q,card){
  card.innerHTML=`
    <div class="q-instruction">${q.instruction}</div>
    <div class="audio-wrap">
      <button class="btn-audio" id="abtn" onclick="playAudio('${q.action}')">🔊</button>
      <div class="audio-hint">Tekan butang untuk dengar</div>
    </div>
    <div class="image-grid" id="choices">
      ${q.choices.map(c=>`
        <button class="image-btn" onclick="pickImage('${c}','${q.action}',this)">
          <img src="${IMGS[c]}" alt="${LABELS[c]}">
          <span class="img-label">${LABELS[c]}</span>
        </button>`).join('')}
    </div>`;
  setTimeout(()=>playAudio(q.action),500);
}

function playAudio(action){
  const btn=document.getElementById('abtn'); if(!btn) return;
  btn.classList.add('ringing');
  window.speechSynthesis.cancel();
  const text = LABELS[action];
  // Use slower rate and lower pitch for clearer pronunciation
  const u=new SpeechSynthesisUtterance(text);
  // Try Malay voice first, fall back gracefully
  const voices = window.speechSynthesis.getVoices();
  const msVoice = voices.find(v=>v.lang.startsWith('ms')) || voices.find(v=>v.lang.startsWith('id')) || null;
  if(msVoice) u.voice=msVoice;
  u.lang='ms-MY'; u.rate=0.55; u.pitch=1.0; u.volume=1.0;
  u.onend=()=>btn.classList.remove('ringing');
  window.speechSynthesis.speak(u);
}

// ── MATCH ─────────────────────────────────────────────────
function renderMatch(q,card){
  mState={sel:null,pairs:{}};
  const imgOrd=[...q.pairs].sort(()=>Math.random()-.5);
  const wrdOrd=[...q.pairs].sort(()=>Math.random()-.5);
  mState.imgOrd=imgOrd; mState.wrdOrd=wrdOrd;
  card.innerHTML=`
    <div class="q-instruction">${q.instruction}</div>
    <div class="match-grid">
      <div>
        <div class="match-col-head">🖼 GAMBAR</div>
        <div class="match-items">
          ${imgOrd.map(a=>`<div class="match-item" id="mi-${a}" onclick="selImg('${a}')">
            <img src="${IMGS[a]}" alt="${LABELS[a]}">
          </div>`).join('')}
        </div>
      </div>
      <div>
        <div class="match-col-head">📝 ARAHAN</div>
        <div class="match-items">
          ${wrdOrd.map(a=>`<div class="match-item" id="mw-${a}" onclick="selWrd('${a}')">
            <span class="mw-label">${LABELS[a]}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>
    <button class="match-submit" id="msub" onclick="checkMatch()" disabled>Semak Jawapan ✔</button>`;
}

function selImg(a){
  if(mState.pairs[a]!==undefined) return;
  document.querySelectorAll('[id^="mi-"]').forEach(e=>e.classList.remove('selected'));
  mState.sel=a;
  document.getElementById('mi-'+a).classList.add('selected');
}

function selWrd(a){
  if(!mState.sel) return;
  const img=mState.sel;
  if(mState.pairs[img]!==undefined) return;
  const used=Object.values(mState.pairs).includes(a); if(used) return;
  const idx=Object.keys(mState.pairs).length;
  mState.pairs[img]=a;
  const iEl=document.getElementById('mi-'+img);
  const wEl=document.getElementById('mw-'+a);
  const cls='matched'; const col=MCOLORS[idx];
  iEl.classList.remove('selected'); iEl.classList.add(cls);
  wEl.classList.add(cls);
  iEl.style.borderColor=col; iEl.style.background=col+'22';
  wEl.style.borderColor=col; wEl.style.background=col+'22';
  const d1=document.createElement('div'); d1.className='match-dot'; d1.style.background=col; iEl.appendChild(d1);
  const d2=document.createElement('div'); d2.className='match-dot'; d2.style.background=col; wEl.appendChild(d2);
  mState.sel=null;
  if(Object.keys(mState.pairs).length===3) document.getElementById('msub').disabled=false;
}

function checkMatch(){
  if(answered) return; answered=true;
  document.getElementById('msub').disabled=true;
  const allOk=Object.keys(mState.pairs).every(k=>mState.pairs[k]===k);
  if(allOk){ score++; showFeedback(true); }
  else showFeedback(false);
  setTimeout(()=>document.getElementById('btn-next').classList.add('visible'),1200);
}

// ── PICK HELPERS ──────────────────────────────────────────
function pickImage(chosen,correct,btn){
  if(answered) return; answered=true;
  disableAll();
  if(chosen===correct){ btn.classList.add('correct'); score++; showFeedback(true); }
  else{
    btn.classList.add('wrong');
    document.querySelectorAll('#choices .image-btn').forEach(b=>{
      if(b.querySelector('img')&&b.querySelector('img').alt===LABELS[correct]) b.classList.add('correct');
    });
    showFeedback(false);
  }
  setTimeout(()=>document.getElementById('btn-next').classList.add('visible'),1300);
}

function pickWord(chosen,correct,btn){
  if(answered) return; answered=true;
  disableAll();
  if(chosen===correct){ btn.classList.add('correct'); score++; showFeedback(true); }
  else{
    btn.classList.add('wrong');
    document.querySelectorAll('#choices .word-btn').forEach(b=>{
      if(b.textContent.trim()===LABELS[correct]) b.classList.add('correct');
    });
    showFeedback(false);
  }
  setTimeout(()=>document.getElementById('btn-next').classList.add('visible'),1300);
}

function disableAll(){
  document.querySelectorAll('#choices button').forEach(b=>b.disabled=true);
}

function showFeedback(ok){
  const fb=document.getElementById('feedback-bar');
  if(ok){
    fb.textContent=['🌟 Bagus sekali! Jawapan betul!','⭐ Hebat! Kamu bijak!','🎉 Tahniah! Betul!'][Math.floor(Math.random()*3)];
    fb.className='feedback-bar correct show';
  } else {
    fb.textContent=['😊 Hampir betul! Cuba lagi ya!','💪 Jangan putus asa! Boleh buat!','🌈 Tak mengapa! Teruskan!'][Math.floor(Math.random()*3)];
    fb.className='feedback-bar wrong show';
  }
}

// ── NEXT / RESULTS ────────────────────────────────────────
function nextQ(){
  cur++;
  if(cur>=10) showResults();
  else renderQ();
}

function showResults(){
  showScreen('screen-results');
  const p=score/10;
  let trophy,msg;
  if(p===1){trophy='🏆';msg='LUAR BIASA! Kamu menjawab SEMUA soalan dengan betul! Kamu sangat PINTAR ARAHAN! Guru sangat bangga dengan kamu! 🌟';}
  else if(p>=.8){trophy='🥇';msg='HEBAT SEKALI! Kamu hampir sempurna! Teruskan semangat belajar kamu ya!';launchConfetti();}
  else if(p>=.6){trophy='🥈';msg='BAGUS! Kamu faham banyak arahan. Cuba lagi untuk markah yang lebih tinggi!';}
  else if(p>=.4){trophy='🥉';msg='BAIK! Jangan putus asa. Teruskan berlatih dan kamu pasti boleh!';}
  else{trophy='💪';msg='Cuba lagi! Baca setiap arahan dengan teliti. Kamu BOLEH buat!';}
  if(p===1) launchConfetti();
  document.getElementById('r-title').textContent='Tahniah, '+(window._studentName||'Murid')+'!';
  document.getElementById('r-trophy').textContent=trophy;
  document.getElementById('r-score').textContent=`Markah kamu: ${score} daripada 10`;
  let st=''; const f=Math.round(p*5);
  for(let i=0;i<5;i++) st+=i<f?'⭐':'☆';
  document.getElementById('r-stars').textContent=st;
  document.getElementById('r-msg').textContent=msg;
}

function launchConfetti(){
  const cols=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#EC4899','#F97316','#8B5CF6'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div'); el.className='confetti-p';
    const sz=8+Math.random()*12;
    el.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${2.5+Math.random()*2}s;animation-delay:${Math.random()*1.5}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}
// Pre-load voices
if(window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function(){window.speechSynthesis.getVoices();};
}

// Prevent double-tap zoom on buttons
document.addEventListener('touchstart', function(){}, {passive:true});

// Fix iOS 100vh
function fixVH(){
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}
fixVH();
window.addEventListener('resize', fixVH);
</script>
